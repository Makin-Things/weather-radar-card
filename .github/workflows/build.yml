name: "Build"

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Test build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  commit-dist:
    name: Commit dist back to branch
    runs-on: ubuntu-latest
    needs: build
    # Direct pushes and manual runs (not PRs from forks). The "[skip ci]" tag
    # in the auto-commit message stops this from triggering itself recursively.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run rollup

      - name: Compress dist (master only)
        if: github.ref == 'refs/heads/master'
        run: gzip -kf dist/weather-radar-card.js

      - name: Commit dist file(s)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/weather-radar-card.js
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            git add -f dist/weather-radar-card.js.gz
          fi
          git diff --staged --quiet || git commit -m "chore: update dist [skip ci]"
          git push
